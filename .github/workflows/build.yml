name: Gerar Executavel Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependencias e Gerar EXE
      run: |
        pip install customtkinter pygame pyinstaller
        pyinstaller --noconfirm --onedir --windowed --add-data "[Efeito Sonoro] Sinos - Brilhante.mp3;." main.py

    - name: Guardar Aplicativo
      uses: actions/upload-artifact@v4
      with:
        name: TimeFlow-Windows
        path: dist/main/
